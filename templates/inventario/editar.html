<!DOCTYPE html>
<html>
<head>
    <title>Editar producto</title>
</head>

<body>

<h1>Editar producto</h1>

{% if error %}
<p style="color:red"><b>{{ error }}</b></p>
{% endif %}

<form method="POST">

    <label>Nombre:</label><br>
    <input type="text" name="nombre" value="{{ nombre }}" required><br><br>

    <label>Precio:</label><br>
    <input type="number" name="precio" value="{{ info.precio }}" min="0" required><br><br>

    <label>Cantidad:</label><br>
    <input type="number" name="cantidad" value="{{ info.cantidad }}" min="1" required><br><br>

    <label>Categoria:</label><br>
    <input type="text" name="categoria" value="{{ info.categoria }}" required><br><br>

    <button type="submit">Guardar cambios</button>

</form>

<br>
<a href="/inventario">Volver</a>

</body>
</html>
